## Render.com Infrastructure-as-Code
## Docs: https://render.com/docs/blueprint-spec

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: cia-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter          # $7/mo — no sleep; use "free" for testing (sleeps after 15 min)
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cia-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      # ── LLM ──────────────────────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false   # задать вручную в Dashboard → Environment
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # ── Scraping / Search ─────────────────────────────────────────────────────
      - key: SCRAPEOPS_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      # ── App ──────────────────────────────────────────────────────────────────
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false   # задать после деплоя: https://cia-frontend.onrender.com,http://localhost:3000

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: cia-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A tasks.celery_app worker --loglevel=info --concurrency=2
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cia-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SCRAPEOPS_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: SECRET_KEY
        generateValue: true

  # ── Celery Beat (планировщик) ─────────────────────────────────────────────────
  - type: worker
    name: cia-celery-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: celery -A tasks.celery_app beat --loglevel=info
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cia-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: cia-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: cia-redis
    plan: free             # 25MB, без сна
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []        # только внутренние сервисы

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  - type: web
    name: cia-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: cia-backend
          property: host
          transform: https://{value}

databases:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  - name: cia-postgres
    plan: free             # 1GB, 90 дней бесплатно
    databaseName: cia_db
    user: cia_user
    postgresMajorVersion: 16
